name: Continuous Integration

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.PGUSER_TEST }}
          POSTGRES_PASSWORD: ${{ secrets.PGPASSWORD_TEST }}
          POSTGRES_DB: ${{ secrets.PGDATABASE_TEST }}

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm install migrate and test
        run: |
          npm ci
          npx node-pg-migrate up
          npm run test
        env:
          CI: true
          DATABASE_URL: 'postgres://${{ secrets.PGUSER_TEST }}:${{ secrets.PGPASSWORD_TEST }}@localhost:5432/${{ secrets.PGDATABASE_TEST }}'

          ACCESS_TOKEN_KEY: '${{ secrets.ACCESS_TOKEN_KEY_TEST }}'
          REFRESH_TOKEN_KEY: '${{ secrets.REFRESH_TOKEN_KEY_TEST }}'
          ACCESS_TOKEN_AGE: '${{ secrets.ACCESS_TOKEN_AGE_TEST }}'
